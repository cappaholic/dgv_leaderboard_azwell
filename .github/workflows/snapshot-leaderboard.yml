name: Snapshot Daily Leaderboard

on:
  schedule:
    # Runs at 23:55 UTC — 5 minutes before midnight UTC reset (7:55 PM EDT / 8 PM EST in winter)
    - cron: '55 23 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and save leaderboard snapshot
        run: |
          # ── Config ──────────────────────────────────────────────────
          VERCEL_URL="https://dgv-vr-daily-leaderboard-azwell.vercel.app"
          PROJECT_ID="22c95154-2fe0-4923-8792-e2fe16880302"
          LEADERBOARD_ID="daily_challenge"

          # ── Step 1: Get session token from Vercel proxy ──────────────
          echo "Fetching session token..."
          SESSION_RESPONSE=$(curl -s "$VERCEL_URL/api/session")
          SESSION_TOKEN=$(echo "$SESSION_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['token'] if d.get('found') and d.get('token') else '')")

          if [ -z "$SESSION_TOKEN" ]; then
            echo "ERROR: Could not retrieve session token"
            exit 1
          fi
          echo "Session token retrieved."

          # ── Step 2: Exchange for access token ────────────────────────
          echo "Exchanging for access token..."
          AUTH_RESPONSE=$(curl -s -X POST "$VERCEL_URL/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"sessionToken\": \"$SESSION_TOKEN\"}")
          ACCESS_TOKEN=$(echo "$AUTH_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('accessToken') or d.get('idToken') or '')")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: Could not exchange for access token"
            exit 1
          fi
          echo "Access token retrieved."

          # ── Step 3: Fetch all leaderboard pages ──────────────────────
          echo "Fetching leaderboard..."
          FIRST=$(curl -s \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "$VERCEL_URL/api/leaderboard/v1/projects/$PROJECT_ID/leaderboards/$LEADERBOARD_ID/scores?limit=100&offset=0")

          TOTAL=$(echo "$FIRST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total', len(d.get('results',[]))))")
          echo "Total scores: $TOTAL"

          # Fetch remaining pages, compute par, and save snapshot
          python3 << EOF
          import json, urllib.request, math

          access_token = "$ACCESS_TOKEN"
          vercel_url   = "$VERCEL_URL"
          project_id   = "$PROJECT_ID"
          lb_id        = "$LEADERBOARD_ID"
          total        = int("$TOTAL")

          first = json.loads('''$FIRST'''.replace("'", "\\'"))
          all_results = first.get("results", [])

          pages = math.ceil(total / 100)
          for page in range(1, pages):
            offset = page * 100
            url = f"{vercel_url}/api/leaderboard/v1/projects/{project_id}/leaderboards/{lb_id}/scores?limit=100&offset={offset}"
            req = urllib.request.Request(url, headers={"Authorization": f"Bearer {access_token}"})
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
              all_results.extend(data.get("results", []))

          # ── Fetch daily seed and compute par ─────────────────────────
          COURSES = [
            {"name": "Sunshine Glade",    "holes": [3,3,3,3,4]},
            {"name": "Blueberry Thicket", "holes": [3,3,4,3,3,3,3,3,3]},
            {"name": "Oak Hill",          "holes": [4,3,4,4,4,4,4,4,3]},
            {"name": "Lakeside",          "holes": [3,4,3,5,4,3,3,3,5]},
            {"name": "Windswept Fields",  "holes": [3,4,4,3,4,3,3,3,3]},
            {"name": "Harrowing Woods",   "holes": [3,3,3,3,4,4,3,4,5]},
            {"name": "The Crows Nest",    "holes": [3,3,4,4,3,3,4,3,4]},
            {"name": "Grizzly Gulch",     "holes": [3,3,4,3,4,4,3,4,3]},
          ]

          def system_random(seed):
            MBIG = 2147483647
            sa = [0] * 56
            mj = 161803398 - abs(seed)
            if mj < 0: mj += MBIG
            sa[55] = mj
            mk = 1
            for i in range(1, 55):
              ii = (21 * i) % 55
              sa[ii] = mk
              mk = mj - mk
              if mk < 0: mk += MBIG
              mj = sa[ii]
            for k in range(1, 5):
              for i in range(1, 56):
                n = i + 30
                if n >= 55: n -= 55
                sa[i] -= sa[1 + n]
                if sa[i] < 0: sa[i] += MBIG
            state = {"sa": sa, "inext": 0, "inextp": 21}
            def sample():
              li = state["inext"] + 1
              lp = state["inextp"] + 1
              if li >= 56: li = 1
              if lp >= 56: lp = 1
              v = state["sa"][li] - state["sa"][lp]
              if v == MBIG: v -= 1
              if v < 0: v += MBIG
              state["sa"][li] = v
              state["inext"] = li
              state["inextp"] = lp
              return v
            def next_range(mn, mx):
              r = mx - mn
              if r <= 1: return mn
              return mn + int((sample() / 2147483647.0) * r)
            return sample, next_range

          total_par = None
          try:
            seed_url = f"{vercel_url}/api/cloudsave/v1/data/projects/{project_id}/custom/dailySeed/items"
            req = urllib.request.Request(seed_url, headers={"Authorization": f"Bearer {access_token}"})
            with urllib.request.urlopen(req) as r:
              seed_data = json.loads(r.read())
              seed_entry = next((x for x in seed_data.get("results", []) if x["key"] == "seed"), None)
              if seed_entry:
                seed_value = int(seed_entry["value"])
                sample, next_range = system_random(seed_value)
                pool = list(range(len(COURSES)))
                selected = []
                for i in range(3):
                  idx = next_range(0, len(pool))
                  selected.append(pool[idx])
                  pool.pop(idx)
                total_par = 0
                for ci in selected:
                  course = COURSES[ci]
                  keyed = [(course["holes"][j], sample()) for j in range(len(course["holes"]))]
                  keyed.sort(key=lambda x: x[1])
                  total_par += sum(h[0] for h in keyed[:3])
                print(f"Computed par: {total_par}")
          except Exception as e:
            print(f"Par computation failed: {e}")

          # ── Compute tied ranks ────────────────────────────────────────
          ranks = []
          for i, entry in enumerate(all_results):
            if i > 0 and entry["score"] == all_results[i-1]["score"]:
              ranks.append(ranks[i-1])
            else:
              ranks.append(i + 1)

          snapshot = {
            "scores": all_results,
            "ranks":  ranks,
            "total":  total,
            "par":    total_par
          }

          # ── Save to public/ so Vercel serves it at /yesterday.json ──
          with open("public/yesterday.json", "w") as f:
            json.dump(snapshot, f)

          print(f"Snapshot saved with {len(all_results)} entries, par={total_par}.")
          EOF

      - name: Commit snapshot to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/yesterday.json
          git diff --staged --quiet || git commit -m "chore: daily leaderboard snapshot [skip ci]"
          git push
